<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Connexion — CB Bretagne</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F7F5F4;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:10px;padding:2rem;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.logo{display:flex;justify-content:center;margin-bottom:1.5rem}
.logo img{max-width:180px;height:auto}
h2{font-size:16px;font-weight:600;color:#3A3A3A;margin-bottom:1.25rem;text-align:center}
.field{margin-bottom:.75rem}
.field label{font-size:11px;color:#6B6B6B;font-weight:500;display:block;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;font-size:13px;border:1px solid #DDDCDA;border-radius:6px;outline:none}
.field input:focus{border-color:#2BBFA4;box-shadow:0 0 0 2px rgba(43,191,164,.12)}
.btn-login{width:100%;padding:9px;background:#67123A;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;margin-top:.5rem}
.btn-login:hover{background:#4E1529}
.error{background:#FDECEB;color:#C0392B;border-left:3px solid #C0392B;padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:1rem}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <img src="/media/logo/logo_CB_B_C_V_web.png" alt="Compagnons Bâtisseurs Bretagne"/>
  </div>
  <h2>Connexion</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field"><label>Identifiant</label><input type="text" name="username" autofocus/></div>
    <div class="field"><label>Mot de passe</label><input type="password" name="password"/></div>
    <button type="submit" class="btn-login">Se connecter</button>
  </form>
  <a href="/mot-de-passe-oublie/" style="display:block;text-align:center;margin-top:1rem;font-size:12px;color:#6B6B6B;text-decoration:none;">
    Mot de passe oublié ?
  </a>
</div>
</body>
</html>
