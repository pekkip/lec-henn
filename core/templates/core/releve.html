<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Relevé — CB Bretagne</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'core/app.css' %}">
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#eef1f6; }
    #app { padding-top: env(safe-area-inset-top); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
  </style>
</head>
<body>
{% csrf_token %}
<script>
  const CSRF_TOKEN = "{{ csrf_token }}";
  const DEVIS_LIST  = {{ devis_json|safe }};
  const PRESELECT   = "{{ preselect }}";
  const IMPORT_URL  = "{% url 'core:releve-import' %}";
  const BIBLIO_URL  = "{% url 'core:biblio-get' %}";
</script>

<div id="app">
<style>
  #app{--acc:#2b5fa6;--acc-d:#1c4f8a;--bg:#eef1f6;--card:#ffffff;--line:#e3e7ef;--ink:#2a2f3a;--mut:#7a8497;
       --paper:#f5f8fc;--sel:#e2622d;--teal:#2ec4b6;--prune:#b07bac;--bleu:#7d93c0;--ambre:#e0a458;--gris:#8a96a0;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); border-radius:0; overflow:hidden; user-select:none; -webkit-user-select:none; max-width:100%; flex:1; display:flex; flex-direction:column;}
  #app *{box-sizing:border-box;}
  #app .ic{width:20px;height:20px;vertical-align:-4px}
  #app .appbar{display:flex; align-items:center; gap:8px; padding:13px 14px; background:var(--acc); color:#fff; flex-shrink:0;}
  #app .appbar .ttl{font-size:16px; font-weight:600;} #app .appbar .sp{flex:1;}
  #app .seg{display:flex; background:rgba(255,255,255,.2); border-radius:22px; overflow:hidden; font-size:13px; font-weight:600;}
  #app .seg button{background:transparent; border:none; color:#fff; padding:6px 15px; border-radius:22px; cursor:pointer;}
  #app .seg button.on{background:#fff; color:var(--acc);}
  #app .gbtn{background:transparent; border:none; color:#fff; cursor:pointer; padding:4px; display:flex;}
  #app .tools{display:flex; gap:6px; align-items:center; padding:8px 12px; background:var(--card); border-bottom:1px solid var(--line); flex-wrap:wrap; flex-shrink:0;}
  #app .settings{display:none; gap:12px; align-items:center; padding:9px 12px; background:#f0f3f8; border-bottom:1px solid var(--line); flex-wrap:wrap; flex-shrink:0;}
  #app .settings.on{display:flex;}
  #app button.t{background:#f4f6fa; color:var(--ink); border:1px solid var(--line); border-radius:9px; padding:9px 12px; font-size:13px; cursor:pointer; touch-action:manipulation;}
  #app button.t:active{transform:scale(.97);} #app button.t:disabled{opacity:.4;}
  #app button.warn{color:#c0392b;}
  #app label{font-size:12px; color:var(--mut); display:flex; gap:5px; align-items:center;}
  #app input.num{background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:9px 8px; min-width:58px; width:62px; font-size:14px; text-align:center; cursor:pointer; -webkit-user-select:none; user-select:none;}
  #app input.num:active{background:#eef3fb; border-color:var(--acc);}
  #app input[type=text].free{background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px 7px; width:54px; font-size:13px;}
  #app .stagewrap{position:relative; background:var(--paper); flex:1; overflow:hidden; min-height:0;}
  #app svg.stage{display:block; width:100%; height:100%; touch-action:none; background:var(--paper);}
  #app .fab{position:absolute; right:16px; bottom:16px; width:54px; height:54px; border-radius:50%; background:var(--acc); color:#fff; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; box-shadow:0 3px 12px rgba(43,95,166,.45);}
  #app .fab .ic{width:26px;height:26px;}
  #app .overlay{position:absolute; left:12px; right:12px; bottom:12px; display:flex; gap:8px; align-items:center; background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:12px; padding:8px 12px; font-size:12px; color:var(--mut); box-shadow:0 2px 8px rgba(40,60,90,.1);}
  #app .overlay input[type=range]{flex:1;}
  #app .hint{position:absolute; top:12px; left:12px; background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:9px; padding:6px 11px; font-size:12px; color:#5a6678; max-width:74%; box-shadow:0 2px 8px rgba(40,60,90,.08);}
  #app .panel{display:none; padding:12px; max-height:38vh; overflow:auto; background:var(--bg);}
  #app .panel.on{display:block;}
  #app .nav{display:flex; background:var(--card); border-top:1px solid var(--line); flex-shrink:0; padding-bottom:env(safe-area-inset-bottom);}
  #app .nav button{flex:1; border:none; background:transparent; padding:9px 4px 8px; color:#9aa0b0; font-size:11px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-weight:600;}
  #app .nav button.on{color:var(--acc);}
  #app .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:10px;}
  #app .room-h{display:flex; align-items:center; gap:8px; cursor:pointer;}
  #app .swatch{width:12px; height:12px; border-radius:3px; flex:none;}
  #app .room-h b{font-size:14px;} #app .room-h .meta{color:var(--mut); font-size:12px; margin-left:auto;}
  #app .mrow{display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid var(--line); font-size:13px; flex-wrap:wrap;}
  #app .mrow .nm{min-width:78px; color:var(--mut);} #app .mrow .val{font-weight:600; min-width:64px;}
  #app .mrow button,#app .wall-edit button{background:#eef3fb; color:var(--acc-d); border:1px solid #d4e2f2; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer;}
  #app .assign{display:flex; align-items:center; gap:6px; padding:5px 0 5px 12px; font-size:13px; flex-wrap:wrap;}
  #app .assign .tl{font-size:11px; background:#eef3fb; border:1px solid #d4e2f2; border-radius:5px; padding:1px 5px; color:var(--acc-d); font-weight:600;}
  #app .assign .x{margin-left:auto; color:#c0392b; cursor:pointer; padding:2px 7px;}
  #app .wall-edit{padding:8px 0 4px 12px; border-top:1px dashed var(--line); font-size:13px;}
  #app .wall-edit .op{display:flex; gap:6px; align-items:center; flex-wrap:wrap; padding:6px 4px; color:var(--mut); border-radius:7px;}
  #app .wall-edit .op.op-sel{background:#fdeee6; border-left:3px solid var(--sel);}
  #app .tag{font-size:11px; background:#fbeeda; border:1px solid var(--ambre); border-radius:5px; padding:1px 5px; color:#854f0b; font-weight:600;}
  #app textarea{width:100%; height:130px; background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:10px; font-family:ui-monospace,monospace; font-size:12px; white-space:pre;}
  #app select{background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px; width:100%; font-size:13px; margin-bottom:8px;}
  #app .libgrp>.gh{display:flex; align-items:center; gap:6px; cursor:pointer; padding:6px 0; font-weight:600;}
  #app .libitem{display:flex; align-items:center; gap:8px; padding:8px 10px; margin:3px 0; border-radius:9px; background:var(--card); border:1px solid var(--line); cursor:pointer; font-size:13px;}
  #app .libitem:active{background:#eef3fb;}
  #app .libitem .tl{font-size:11px; background:#eef3fb; border:1px solid #d4e2f2; border-radius:5px; padding:1px 5px; color:var(--acc-d); font-weight:600;}
  #app .libitem .u{margin-left:auto; color:var(--mut); font-size:12px;}
  #app .target{background:#eef3fb; border:1px solid var(--acc); border-radius:10px; padding:8px 10px; margin-bottom:10px; font-size:13px;}
  #app .muted{color:var(--mut); font-size:12px;}
  #app .prim{background:var(--acc); color:#fff; border:none; border-radius:9px; padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer;}
  #app .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(24px + env(safe-area-inset-bottom)); background:var(--ink); color:#fff; padding:10px 16px; border-radius:10px; font-size:13px; z-index:70; opacity:0; transition:opacity .2s; pointer-events:none;}
  #app .toast.show{opacity:1;}
  #app h4{margin:2px 0 8px; font-size:13px; color:var(--mut); font-weight:600;}
  #app .padback{position:fixed; inset:0; background:rgba(20,30,45,.4); z-index:60; display:none;}
  #app .padback.on{display:block;}
  #app .pad{position:fixed; left:0; right:0; bottom:0; max-width:520px; margin:0 auto; background:#fff; border-radius:20px 20px 0 0; padding:14px 14px 18px; box-shadow:0 -6px 26px rgba(20,40,70,.2); transform:translateY(110%); transition:transform .2s;}
  #app .padback.on .pad{transform:translateY(0);}
  #app .pad .disp{display:flex; align-items:baseline; gap:8px; padding:4px 4px 2px;}
  #app .pad .lbl{font-size:13px; color:var(--mut); flex:1;}
  #app .pad .val{font-size:30px; font-weight:700; color:var(--ink);}
  #app .pad .unit{font-size:16px; color:var(--mut);}
  #app .pad .presets{display:flex; gap:7px; flex-wrap:wrap; margin:10px 0 12px;}
  #app .pad .presets button{background:#eef3fb; color:var(--acc-d); border:1px solid #d4e2f2; border-radius:18px; padding:8px 14px; font-size:15px; cursor:pointer;}
  #app .pad .body{display:flex; gap:8px;}
  #app .pad .digits{flex:3; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  #app .pad .side{flex:1; display:flex; flex-direction:column; gap:8px;}
  #app .pad .body button{border:1px solid var(--line); background:#f4f6fa; border-radius:13px; padding:18px 0; font-size:21px; font-weight:600; color:var(--ink); cursor:pointer;}
  #app .pad .body button:active{background:#e6ebf3;}
  #app .pad .side button{flex:1; font-size:22px;}
  #app .pad .ok{width:100%; margin-top:10px; background:var(--acc); color:#fff; border:none; border-radius:13px; padding:16px 0; font-size:17px; font-weight:700; cursor:pointer;}
</style>

 <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></symbol>

<div class="appbar"><span class="ttl">Relevé</span><span class="sp"></span>
  <div class="seg"><button id="bPlan" class="on" onclick="setView('plan')">Plan</button><button id="bIso" onclick="setView('iso')">3D</button></div>
  <button class="gbtn" id="btnFs" onclick="toggleFs()" title="Plein écran"><svg class="ic"><use href="#i-expand"/></svg></button>
  <a id="btnBack" class="gbtn" href="{% url 'core:planning' %}" title="Retour au planning" style="text-decoration:none;color:inherit"><svg class="ic"><use href="#i-back"/></svg></a>

</div>

<div class="tools" id="planTools">
  <button class="t" onclick="undoPoint()">↩︎ Point</button>
  <button class="t" id="bDelPt" onclick="delSelVertex()" disabled>✕ Point</button>
  <span style="flex:1"></span>

</div>

<div class="stagewrap">
  <div class="hint" id="hint"></div>
  <svg class="stage" id="stage" xmlns="http://www.w3.org/2000/svg"></svg>
  <button class="fab" id="fab" onclick="startRoom()" aria-label="Ajouter une pièce"><svg class="ic"><use href="#i-plus"/></svg></button>
  <div class="overlay" id="isoOverlay" style="display:none">

<div id="pZones" class="panel on"></div>

<div id="pLib" class="panel">

<div class="nav">

  <button id="tLib" onclick="setTab('lib')"><svg class="ic"><use href="#i-book"/></svg>Bibliothèque</button>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const VW=1000, VH=640, PAD=46, SEL='#e2622d';
  const PALETTE=['#2ec4b6','#b07bac','#7d93c0','#e0a458','#8a96a0','#e06b6b','#5b8fe0'];
  const roomCol=r=>PALETTE[S.rooms.indexOf(r)%PALETTE.length];
  const KINDS={ h:{unit:'cm',step:10,presets:[200,240,250,260,270]}, ow:{unit:'cm',step:5,presets:[63,73,83,93,103,120]},
    oh:{unit:'cm',step:5,presets:[120,135,150,204,210,220]}, sill:{unit:'cm',step:5,presets:[0,90,100,110]},
    off:{unit:'cm',step:5,presets:[]}, qty:{unit:'',step:1,presets:[]}, scale:{unit:'cm',step:5,presets:[10,20,25,50,100]} };
  let uid=1; const nid=()=>'i'+(uid++);

  const SAMPLE=[ {type_ligne:'TITRE', description:'Peinture intérieure', enfants:[ {type_ligne:'S', description:'Peinture murs', unite:'m²'},{type_ligne:'S', description:'Peinture plafond', unite:'m²'},{type_ligne:'C', description:'Préparation + peinture murs', unite:'m²'},{type_ligne:'FMO', description:'Protection & masquage', unite:'forfait'} ]},
    {type_ligne:'TITRE', description:'Menuiserie', enfants:[ {type_ligne:'S', description:'Peinture portes', unite:'u'},{type_ligne:'S', description:'Dépose / repose fenêtre', unite:'u'} ]},
    {type_ligne:'TITRE', description:'Sols & plinthes', enfants:[ {type_ligne:'S', description:'Ragréage', unite:'m²'},{type_ligne:'S', description:'Pose parquet', unite:'m²'},{type_ligne:'S', description:'Plinthes', unite:'ml'} ]} ];

  let S=null;
  function fresh(){ return { view:'plan', tab:'zones', cellCm:50, cols:16, rows:16, defaultHeightCm:250, panX:0, panY:0, zoom:1, rooms:[], drawing:null, selRoom:null, selWall:null, selVertex:null, library:null, libraryRaw:'', assignments:[], azimuth:0.7, elev:0.66, pending:null, expanded:{} }; }

  const KEY='releve_devis_state_v1';
  const Store={ async save(){ const d=JSON.stringify(S); try{ localStorage.setItem(KEY,d); }catch(e){} },
    async load(){ try{ const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){} return null; } };
  let saveT=null; function save(){ clearTimeout(saveT); saveT=setTimeout(()=>Store.save(),250); }

  const snap=v=>Math.round(v/S.cellCm)*S.cellCm;
  const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  const eq=(p,q)=>Math.abs(p.x-q.x)<1&&Math.abs(p.y-q.y)<1;
  function area(pts){ let a=0; for(let i=0;i<pts.length;i++){const p=pts[i],q=pts[(i+1)%pts.length]; a+=p.x*q.y-q.x*p.y;} return Math.abs(a)/2; }
  function centroid(pts){ let x=0,y=0; pts.forEach(p=>{x+=p.x;y+=p.y;}); return {x:x/pts.length,y:y/pts.length}; }
  function ptSeg(p,a,b){ const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy; if(!l2) return dist(p,a); let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/l2; t=Math.max(0,Math.min(1,t)); return dist(p,{x:a.x+t*dx,y:a.y+t*dy}); }

    const sc=Math.min((VW-2*PAD)/Math.max(1,maxX-minX),(VH-2*PAD)/Math.max(1,maxY-minY))*0.96; const ox=(VW-(maxX-minX)*sc)/2-minX*sc, oy=(VH-(maxY-minY)*sc)/2-minY*sc; const map=q=>({x:q.sx*sc+ox,y:q.sy*sc+oy});
    faces.sort((a,b)=>b.depth-a.depth); let g=`<rect width="${VW}" height="${VH}" fill="#eef3fb"/>`;
    faces.forEach(f=>{ const m=f.raw.map(map); g+=`<path d="${m.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ')+' Z'}" fill="${f.fill}" stroke="${f.stroke}" stroke-width="${f.kind==='wall'?2.5:1.5}" stroke-linejoin="round"/>`; if(f.kind==='wall') isoQuads.push({pts:m, roomId:f.roomId, wall:f.wall}); });

  }

  function render(){ if(S.view==='plan'){ renderPlan(); $('isoOverlay').style.display='none'; $('planTools').style.display='flex'; $('fab').style.display='flex'; } else { renderIso(); $('isoOverlay').style.display='flex'; $('planTools').style.display='none'; $('fab').style.display='none'; updateIsoOverlay(); } $('bDelPt').disabled=!S.selVertex; updateHint(); }
  function updateHint(){ const h=$('hint'); if(S.view==='plan'){ if(S.drawing) h.textContent='Tape les coins ; reviens sur le point orange pour fermer. Glisse le vide = déplacer.'; else if(S.selVertex) h.textContent='Point sélectionné — glisse-le, ou « ✕ Point » pour le retirer.'; else if(S.selRoom) h.textContent='Tape une cote pour saisir la longueur · glisse un coin · « + » insère un point.'; else h.textContent='Bouton + pour une pièce. Tape une cote pour saisir sa longueur. Glisse le vide pour déplacer.'; } else h.textContent='Glisse pour tourner / incliner. Tape un mur : il s\'ouvre surligné dans Zones.'; }
  function updateIsoOverlay(){ const r=S.rooms.find(x=>x.id===S.selRoom), slider=$('wallH'), lab=$('hLabel'); if(r&&S.selWall!=null){ const w=r.walls[S.selWall], avg=Math.round((w.h1+w.h2)/2); slider.style.display=''; slider.value=avg; const ht=w.h1===w.h2?(w.h1+' cm'):('rampant '+w.h1+'→'+w.h2); lab.textContent=r.name+' · Mur '+(S.selWall+1)+' · '+fmt(wallNet(r,S.selWall))+' m² · '+ht; } else { slider.style.display='none'; lab.textContent='Aucun mur sélectionné'; } }
  function scrollSelWall(){ if(S.selRoom&&S.selWall!=null){ const e=document.getElementById('wrow_'+S.selRoom+'_'+S.selWall); if(e&&e.scrollIntoView) e.scrollIntoView({block:'center'}); } }

  function nearestVertex(p){ let best=null; S.rooms.forEach(r=>r.points.forEach((pt,idx)=>{ const d=dist(p,pt); if(d<S.cellCm*0.5&&(!best||d<best.d)) best={roomId:r.id,idx,d}; })); return best; }
  function midpointHandle(p){ if(!S.selRoom) return null; const r=S.rooms.find(x=>x.id===S.selRoom); if(!r) return null; for(let i=0;i<r.points.length;i++){ const a=r.points[i],b=r.points[(i+1)%r.points.length],m={x:(a.x+b.x)/2,y:(a.y+b.y)/2}; if(dist(p,m)<S.cellCm*0.42) return {roomId:r.id,edge:i}; } return null; }
  function insertVertex(roomId,i){ const r=S.rooms.find(x=>x.id===roomId); const a=r.points[i],b=r.points[(i+1)%r.points.length]; const m={x:snap((a.x+b.x)/2),y:snap((a.y+b.y)/2)}; const w=r.walls[i],hm=Math.round((w.h1+w.h2)/2); const nw={id:nid(),h1:hm,h2:w.h2,openings:[]}; w.h2=hm; r.points.splice(i+1,0,m); r.walls.splice(i+1,0,nw); S.selVertex={roomId,idx:i+1}; S.selWall=null; }
  function wallMatch(roomId,i){ const r=S.rooms.find(x=>x.id===roomId); const a0=r.points[i],a1=r.points[(i+1)%r.points.length]; for(const o of S.rooms){ if(o.id===roomId) continue; for(let j=0;j<o.points.length;j++){ const b0=o.points[j],b1=o.points[(j+1)%o.points.length]; if(eq(a0,b0)&&eq(a1,b1)) return {room:o,wall:j,reversed:false}; if(eq(a0,b1)&&eq(a1,b0)) return {room:o,wall:j,reversed:true}; } } return null; }
  function setWallLength(roomId,i,lenCm){ if(lenCm<=0) return; const r=S.rooms.find(x=>x.id===roomId); if(!r) return; const j=(i+1)%r.points.length; const du=unit(r.points[i],r.points[j]); r.points[j]={x:r.points[i].x+du.x*lenCm, y:r.points[i].y+du.y*lenCm}; render(); renderZones(); save(); }

  let down=null;
  stage.addEventListener('pointerdown', e=>{ e.preventDefault(); const p=svgPt(e); down={cx:e.clientX,cy:e.clientY,az:S.azimuth,el:S.elev,moved:false,vertex:null,handled:false,pan:null}; stage.setPointerCapture(e.pointerId);
    if(S.view==='plan'){ if(!S.drawing){ const mh=midpointHandle(p); if(mh){ insertVertex(mh.roomId,mh.edge); down.handled=true; render(); renderZones(); save(); return; } const v=nearestVertex(p); if(v){ down.vertex=v; S.selVertex=v; S.selRoom=v.roomId; S.selWall=null; render(); } } if(!down.vertex&&!down.handled) down.pan={x0:S.panX,y0:S.panY}; } });
  stage.addEventListener('pointermove', e=>{ if(!down) return; const dxs=e.clientX-down.cx,dys=e.clientY-down.cy; if(Math.abs(dxs)+Math.abs(dys)>6) down.moved=true;
    if(S.view==='plan'&&down.vertex){ const p=svgPt(e); const r=S.rooms.find(x=>x.id===down.vertex.roomId); r.points[down.vertex.idx]={x:snap(p.x),y:snap(p.y)}; renderPlan(); return; }
    if(S.view==='plan'&&down.pan&&down.moved){ const vw=(S.cols*S.cellCm)/S.zoom, vh=(S.rows*S.cellCm)/S.zoom; S.panX=down.pan.x0-dxs*(vw/(stage.clientWidth||800)); S.panY=down.pan.y0-dys*(vh/(stage.clientHeight||500)); renderPlan(); return; }
    if(S.view==='iso'&&down.moved){ S.azimuth=down.az+dxs*0.01; S.elev=Math.max(0.18,Math.min(1.4,down.el-dys*0.006)); renderIso(); } });
  stage.addEventListener('pointerup', e=>{ if(!down) return; const p=svgPt(e); if(S.view==='plan'){ if(down.handled){} else if(down.vertex){ render(); renderZones(); save(); } else if(down.pan&&down.moved){ save(); } else planTap(p); } else { if(!down.moved) isoTap(p); else save(); } down=null; });
  stage.addEventListener('pointercancel', ()=>{ down=null; });

  function planTap(p){
    if(S.drawing){ const sp={x:snap(p.x),y:snap(p.y)}, pts=S.drawing.points; if(pts.length>=3&&dist(sp,pts[0])<S.cellCm*0.6){ finalizeRoom(); return; } if(pts.length&&dist(sp,pts[pts.length-1])<1) return; pts.push(sp); render(); save(); return; }
    for(const ch of coteHits){ if(Math.hypot(p.x-ch.x,p.y-ch.y)<ch.r){ const rm=S.rooms.find(x=>x.id===ch.roomId); openPad({label:'Longueur Mur '+(ch.wall+1)+' — '+rm.name, value:fmt(wallLenCm(rm,ch.wall)/100), unit:'m', presets:[], step:0.05, onConfirm:v=>setWallLength(ch.roomId,ch.wall,v*100)}); return; } }
    let cands=[]; S.rooms.forEach(r=>{ for(let i=0;i<r.points.length;i++){ const d=ptSeg(p,r.points[i],r.points[(i+1)%r.points.length]); if(d<S.cellCm*0.5) cands.push({d,room:r.id,wall:i}); } }); cands.sort((a,b)=>a.d-b.d);
    if(cands.length){ const ci=cands.findIndex(c=>c.room===S.selRoom&&c.wall===S.selWall); const pk=ci>=0?cands[(ci+1)%cands.length]:cands[0]; S.selRoom=pk.room; S.selWall=pk.wall; S.selVertex=null; S.expanded[pk.room]=true; render(); setTab('zones'); requestAnimationFrame(scrollSelWall); if(cands.length>1) toast('Mur mitoyen — re-tape pour l\'autre côté'); save(); return; }
    const r=S.rooms.find(rm=>inPoly(p,rm.points)); if(r){ S.selRoom=r.id; S.selWall=null; S.selVertex=null; render(); openZoneFor(r.id); save(); } else { S.selRoom=null; S.selWall=null; S.selVertex=null; render(); save(); } }
  function isoTap(p){ const hits=[]; for(let i=isoQuads.length-1;i>=0;i--){ if(inPoly(p,isoQuads[i].pts)) hits.push(isoQuads[i]); } if(hits.length){ const hi=hits.findIndex(q=>q.roomId===S.selRoom&&q.wall===S.selWall); const pk=hi>=0?hits[(hi+1)%hits.length]:hits[0]; S.selRoom=pk.roomId; S.selWall=pk.wall; S.selVertex=null; S.expanded[pk.roomId]=true; renderIso(); updateIsoOverlay(); setTab('zones'); requestAnimationFrame(scrollSelWall); if(hits.length>1) toast('Mur mitoyen — re-tape pour l\'autre côté'); save(); return; } S.selWall=null; renderIso(); updateIsoOverlay(); save(); }

  window.startRoom=function(){ S.view='plan'; setViewUI(); S.drawing={points:[]}; S.selRoom=null; S.selWall=null; S.selVertex=null; toast('Tape les coins de la pièce'); render(); };

  window.delSelVertex=function(){ const v=S.selVertex; if(!v)return; const r=S.rooms.find(x=>x.id===v.roomId); if(!r)return; if(r.points.length<=3){ toast('Minimum 3 points'); return; } r.points.splice(v.idx,1); r.walls.splice(Math.min(v.idx,r.walls.length-1),1); S.selVertex=null; render(); renderZones(); save(); };
  function finalizeRoom(){

  function openZoneFor(id){ S.expanded[id]=true; setTab('zones'); renderZones(); }
  function renderZones(){ const el=$('pZones'); if(!S.rooms.length){ el.innerHTML='<div class="muted">Aucune pièce. Touche le bouton + pour en dessiner une.</div>'; return; }
    let h=''; if(S.pending){ const t=S.pending; h+=`<div class="target">Cible : <b>${roomName(t.roomId)} · ${t.label}</b> (${fmt(t.qty)} ${t.unit}). Choisis un article dans Bibliothèque, ou <a style="color:#2b5fa6;cursor:pointer" onclick="freeArticle()">saisie libre</a>. <span style="cursor:pointer;color:#c0392b" onclick="cancelPending()">annuler</span></div>`; }
    S.rooms.forEach(r=>{ const col=roomCol(r), m=measures(r), open=!!S.expanded[r.id];
      h+=`<div class="card"><div class="room-h" onclick="toggleRoom('${r.id}')"><span class="swatch" style="background:${col}"></span><b>${r.name}</b><span class="meta">${fmt(m.sol)} m² sol · ${fmt(m.murs)} m² murs ${open?'▲':'▼'}</span></div>`;

        h+=`<div class="wall-edit"><span class="muted">Murs &amp; ouvertures (H1/H2 pour les rampants) :</span>`;
        for(let i=0;i<r.walls.length;i++){ const w=r.walls[i]; const wsel=(S.selRoom===r.id&&S.selWall===i);
          h+=`<div class="op ${wsel?'op-sel':''}" id="wrow_${r.id}_${i}">Mur ${i+1} · ${fmt(wallLenCm(r,i)/100)} m · H1 <input class="num" type="text" inputmode="none" readonly data-kind="h" data-label="Hauteur début (H1)" value="${w.h1}" onchange="setWH('${r.id}',${i},'h1',this.value)"> · H2 <input class="num" type="text" inputmode="none" readonly data-kind="h" data-label="Hauteur fin (H2)" value="${w.h2}" onchange="setWH('${r.id}',${i},'h2',this.value)"> → <b>${fmt(wallNet(r,i))} m²</b> ${w.h1!==w.h2?'<span class="tag">rampant</span>':''} <button onclick="addOpen('${r.id}',${i},'porte')">+ porte</button> <button onclick="addOpen('${r.id}',${i},'fenetre')">+ fenêtre</button></div>`;
          (w.openings||[]).forEach((o,oi)=>{ h+=`<div class="op">${o.type==='porte'?'porte':'fenêtre'} L<input class="num" type="text" inputmode="none" readonly data-kind="ow" data-label="Largeur" value="${o.width}" onchange="setOp('${r.id}',${i},${oi},'width',this.value)"> H<input class="num" type="text" inputmode="none" readonly data-kind="oh" data-label="Hauteur" value="${o.height}" onchange="setOp('${r.id}',${i},${oi},'height',this.value)"> allège<input class="num" type="text" inputmode="none" readonly data-kind="sill" data-label="Allège" value="${o.sill}" onchange="setOp('${r.id}',${i},${oi},'sill',this.value)"> pos<input class="num" type="text" inputmode="none" readonly data-kind="off" data-label="Position depuis le coin" value="${o.offset}" onchange="setOp('${r.id}',${i},${oi},'offset',this.value)"> ${o.type==='porte'?`<button onclick="setOp('${r.id}',${i},${oi},'swing',${((o.swing||0)+1)%4})">↻ sens</button> <button style="${o.entry?'background:#1d9e75;color:#fff;border-color:#1d9e75':''}" onclick="setOp('${r.id}',${i},${oi},'entry',${o.entry?0:1})">entrée</button>`:''} <span class="x" onclick="delOp('${r.id}',${i},${oi})">✕</span></div>`; });
        }
        h+=`</div><div style="margin-top:6px"><button class="t warn" onclick="delRoom('${r.id}')">Supprimer la pièce</button></div>`;

  function assignRow(a){ return `<div class="assign"><span class="tl">${a.type_ligne}</span> ${a.description} × <input class="num" type="text" inputmode="none" readonly data-kind="qty" data-label="Quantité" value="${fmt(a.qty)}" onchange="setQty('${a.id}',this.value)"> <input class="free" type="text" value="${a.unite}" onchange="setUnite('${a.id}',this.value)"><span class="x" onclick="delAssign('${a.id}')">✕</span></div>`; }
  const roomName=id=>{ const r=S.rooms.find(x=>x.id===id); return r?r.name:'?'; };
  window.toggleRoom=id=>{ S.expanded[id]=!S.expanded[id]; renderZones(); };
  window.delRoom=id=>{ if(!confirm('Supprimer cette pièce et ses ouvrages ?'))return; S.rooms=S.rooms.filter(r=>r.id!==id); S.assignments=S.assignments.filter(a=>a.roomId!==id); if(S.selRoom===id){S.selRoom=null;S.selWall=null;S.selVertex=null;} render(); renderZones(); save(); };

    S.selRoom=id; S.selWall=i; render(); renderZones(); save(); };

    $('freeModalOk').onclick=function(){ const desc=$('freeModalDesc').value.trim(); if(!desc)return; const tl=$('freeModalTl').value; $('freeModal').classList.remove('on'); addAssign({type_ligne:tl,description:desc,unite:S.pending.unit,cout_unitaire:null,enfants:[]}); }; };
  function addAssign(article){ const t=S.pending; if(!t)return;
    S.assignments.push({

  function isGroup(n){ return n.type_ligne==='TITRE'||(n.enfants&&n.enfants.length); }

  window.exportText=function(){ let out=''; S.rooms.forEach(r=>{ const m=measures(r); out+=`=== ${r.name} — Sol ${fmt(m.sol)} m² | Murs ${fmt(m.murs)} m² | Plafond ${fmt(m.plafond)} m² ===\n`; const list=S.assignments.filter(a=>a.roomId===r.id); if(!list.length) out+='  (aucun ouvrage)\n'; list.forEach(a=>out+=`  [${a.type_ligne}] ${a.description} — ${fmt(a.qty)} ${a.unite}\n`); out+='\n'; }); $('expOut').value=out.trim()||'(rien à exporter)'; setTab('exp'); };
  window.exportJson=function(){
    const p=S.rooms.map(r=>({
      type_ligne:'TITRE', description:r.name, quantite:1,

  };
  window.copyExport=function(){ const t=$('expOut'); if(!t.value){toast('Génère d\'abord');return;} navigator.clipboard.writeText(t.value).then(()=>toast('Copié')).catch(()=>{ t.select(); toast('Sélectionné — Ctrl/Cmd+C'); }); };

  window.importToDevis=async function(){
    const sel=$('devisSelect');
    if(!sel.value){ toast('Choisis un devis'); return; }
    exportJson();
    let lignes;
    try{ lignes=JSON.parse($('expOut').value); }catch{ toast('Erreur JSON'); return; }
    if(!lignes.length||!lignes.some(t=>t.enfants&&t.enfants.length)){ toast('Aucun ouvrage à importer'); return; }
    toast('Import en cours…');
    try{
      const resp=await fetch(IMPORT_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':CSRF_TOKEN},
        body:JSON.stringify({devis_id:+sel.value,lignes}),
      });
      const d=await resp.json();
      if(d.ok){ toast('Importé !'); setTimeout(()=>{ window.location.href=d.devis_url; },1200); }
      else toast('Erreur : '+(d.error||'inconnue'));
    }catch{ toast('Erreur réseau'); }
  };

  window.toggleFs=function(){
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
    else{ document.exitFullscreen(); }
  };
  document.addEventListener('fullscreenchange',()=>{
    const inFs=!!document.fullscreenElement;
    const btn=$('btnFs'); if(btn){ btn.title=inFs?'Quitter le plein écran':'Plein écran'; btn.querySelector('use').setAttribute('href',inFs?'#i-compress':'#i-expand'); }
    const ba=$('btnBack'); if(ba) ba.style.display=inFs?'none':'';
  });

  window.setView=v=>{ S.view=v; S.drawing=null; setViewUI(); render(); save(); };
  function setViewUI(){ $('bPlan').classList.toggle('on',S.view==='plan'); $('bIso').classList.toggle('on',S.view==='iso'); }
  window.setTab=t=>{ S.tab=t; ['zones','lib','exp'].forEach(x=>{ $('p'+cap(x)).classList.toggle('on',x===t); $('t'+({zones:'Zones',lib:'Lib',exp:'Exp'})[x]).classList.toggle('on',x===t); }); if(t==='lib') renderLib(); if(t==='zones') renderZones(); save(); };
  const cap=s=>({zones:'Zones',lib:'Lib',exp:'Exp'})[s];
  window.toggleSettings=()=>{ $('settings').classList.toggle('on'); };
  window.setCell=v=>{ S.cellCm=+v||50; render(); save(); };
  window.setDefH=v=>{ S.defaultHeightCm=+v||250; save(); };
  window.setTilt=v=>{ S.elev=(+v)*Math.PI/180; renderIso(); save(); };
  window.setWallH=v=>{ const r=S.rooms.find(x=>x.id===S.selRoom); if(r&&S.selWall!=null){ r.walls[S.selWall].h1=+v; r.walls[S.selWall].h2=+v; updateIsoOverlay(); renderIso(); renderZones(); save(); } };
  window.zoomBy=f=>{ const vw=(S.cols*S.cellCm)/S.zoom, vh=(S.rows*S.cellCm)/S.zoom, cx=S.panX+vw/2, cy=S.panY+vh/2; S.zoom=Math.max(0.25,Math.min(5,S.zoom*f)); const nw=(S.cols*S.cellCm)/S.zoom, nh=(S.rows*S.cellCm)/S.zoom; S.panX=cx-nw/2; S.panY=cy-nh/2; renderPlan(); save(); };
  window.fitView=()=>{ if(!S.rooms.length){ S.zoom=1; S.panX=0; S.panY=0; renderPlan(); save(); return; } let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9; S.rooms.forEach(r=>r.points.forEach(p=>{minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);})); const mg=S.cellCm*2; minX-=mg;minY-=mg;maxX+=mg;maxY+=mg; const bw=maxX-minX,bh=maxY-minY, base=S.cols*S.cellCm, baseH=S.rows*S.cellCm; S.zoom=Math.max(0.25,Math.min(5,Math.min(base/bw,baseH/bh))); const vw=base/S.zoom,vh=baseH/S.zoom; S.panX=minX-(vw-bw)/2; S.panY=minY-(vh-bh)/2; renderPlan(); save(); };
  window.resetAll=()=>{ if(!confirm('Tout effacer (croquis, zones, ouvrages) ?'))return; const lib=S.library; S=fresh(); S.library=lib; syncInputs(); render(); renderZones(); renderLib(); save(); };
  function syncInputs(){ $('cellCm').value=S.cellCm; $('defH').value=S.defaultHeightCm; $('tilt').value=Math.round(S.elev*180/Math.PI); if($('libRaw')) $('libRaw').value=S.libraryRaw||''; }

  $('app').addEventListener('click', e=>{ const inp=e.target.closest('input.num'); if(!inp) return; const k=KINDS[inp.dataset.kind]||KINDS.qty; openPad({ label:inp.dataset.label||'', value:inp.value, unit:k.unit, presets:k.presets, step:k.step, onConfirm:v=>{ inp.value=(Math.round(v*100)/100); inp.dispatchEvent(new Event('change')); } }); });

  (async function init(){
    const loaded=await Store.load();
    S=loaded||fresh();
    if(S.expanded===undefined) S.expanded={};
    if(S.selVertex===undefined) S.selVertex=null;
    if(S.panX===undefined) S.panX=0;
    if(S.panY===undefined) S.panY=0;
    if(S.zoom===undefined) S.zoom=1;
    S.rooms.forEach(r=>r.walls.forEach(w=>{ if(w.h1==null){ const hh=(w.height!=null?w.height:S.defaultHeightCm); w.h1=hh; w.h2=hh; } delete w.height; }));
    syncInputs(); setViewUI(); render(); renderZones();

    // Auto-fetch bibliothèque Django
    fetch(BIBLIO_URL)
      .then(r=>r.json())
      .then(d=>{
        const arr=Array.isArray(d)?d:(d.lignes||[]);
        S.library=arr.map(norm);
        S.taux_mo=d.taux_mo||46;
        $('libStatus').style.display='none';
        $('libFallback').style.display='none';
        renderLib(); save();
      })
      .catch(()=>{
        $('libStatus').textContent='Bibliothèque non disponible (mode hors-ligne)';
        $('libFallback').style.display='';
        if(!S.library||!S.library.length){ S.library=SAMPLE.map(norm); }
        renderLib();
      });

    // Sélecteur de devis pour l'import
    const sel=$('devisSelect');
    DEVIS_LIST.forEach(d=>{
      const o=document.createElement('option');
      o.value=d.id;
      o.textContent=d.ref+' — '+d.client+(d.chantier?' / '+d.chantier:'');
      if(String(d.id)===String(PRESELECT)) o.selected=true;
      sel.appendChild(o);
    });
  })();
})();
</script>
</div>
</body>
</html>
